services:
  vectorforge:
    build:
      context: .
      dockerfile: Dockerfile
      # target: production

    image: vectorforge:latest

    container_name: vectorforge

    ports:
      - "3001:3001"

    environment:
      - CHROMA_DATA_DIR=/data/chroma
      - LOG_LEVEL=INFO
      # Uncomment to customize:
      # - API_PORT=3001
      # - API_HOST=0.0.0.0

    volumes:
      - vectorforge-data:/data
      - ./vectorforge:/app/vectorforge

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

    restart: unless-stopped

    # Resource Limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G
    #     reservations:
    #       cpus: '1'
    #       memory: 1G

  vectorforge-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp

    image: vectorforge-mcp:latest

    container_name: vectorforge-mcp

    ports:
      - "3002:3002"

    environment:
      - VECTORFORGE_API_BASE_URL=http://vectorforge:3001
      - MCP_PORT=3002
      - MCP_HOST=0.0.0.0

    depends_on:
      vectorforge:
        condition: service_healthy

    restart: unless-stopped

volumes:
  vectorforge-data:
    driver: local
